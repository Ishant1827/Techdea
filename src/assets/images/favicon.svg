<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d88cff"/>
      <stop offset="100%" stop-color="#6b1fff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#000"/>

  <!-- Circle -->
  <circle
    cx="256"
    cy="256"
    r="180"
    fill="none"
    stroke="url(#purple)"
    stroke-width="10"/>

  <!-- T -->
  <path
    d="M135 180 H285 L270 215 H215 L180 320 H145 L180 215 H125 Z"
    fill="url(#purple)"/>

  <!-- D -->
  <path
    d="M250 180
       H310
       C380 180 410 220 410 256
       C410 292 380 332 310 332
       H250
       L250 300
       H300
       C345 300 370 280 370 256
       C370 232 345 212 300 212
       H250 Z"
    fill="url(#purple)"/>

  <!-- White diagonal -->
  <polygon
    points="220,300 255,212 285,212 250,300"
    fill="#ffffff"/>

  <!-- Pixel effect -->
  <g fill="url(#purple)">
    <rect x="105" y="255" width="8" height="8"/>
    <rect x="117" y="247" width="8" height="8"/>
    <rect x="129" y="239" width="8" height="8"/>
    <rect x="117" y="263" width="8" height="8"/>
    <rect x="129" y="255" width="8" height="8"/>
    <rect x="141" y="247" width="8" height="8"/>
    <rect x="129" y="271" width="8" height="8"/>
    <rect x="141" y="263" width="8" height="8"/>
  </g>
</svg>